services:
  frontend:
    image: node:20-alpine
    container_name: planinski_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
    depends_on:
      web:
        condition: service_healthy

  web:
    # Django app container with GeoDjango system dependencies.
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: planinski_web
    restart: unless-stopped
    working_dir: /app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      # Mount backend source for live code updates in development.
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-planinski_radar}
      POSTGRES_USER: ${POSTGRES_USER:-planinski_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-planinski_password}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      PSS_ALERTS_URL: ${PSS_ALERTS_URL:-}
      PSS_ALERTS_SOURCE_NAME: ${PSS_ALERTS_SOURCE_NAME:-ПСС}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/system/health/').read(); print('ok')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: planinski_worker
    restart: unless-stopped
    working_dir: /app
    command: celery -A core worker -l info
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-planinski_radar}
      POSTGRES_USER: ${POSTGRES_USER:-planinski_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-planinski_password}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      PSS_ALERTS_URL: ${PSS_ALERTS_URL:-}
      PSS_ALERTS_SOURCE_NAME: ${PSS_ALERTS_SOURCE_NAME:-ПСС}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: planinski_beat
    restart: unless-stopped
    working_dir: /app
    command: celery -A core beat -l info
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-planinski_radar}
      POSTGRES_USER: ${POSTGRES_USER:-planinski_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-planinski_password}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      PSS_ALERTS_URL: ${PSS_ALERTS_URL:-}
      PSS_ALERTS_SOURCE_NAME: ${PSS_ALERTS_SOURCE_NAME:-ПСС}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgis/postgis:15-3.3
    container_name: planinski_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-planinski_radar}
      POSTGRES_USER: ${POSTGRES_USER:-planinski_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-planinski_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planinski_user -d planinski_radar"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: planinski_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
